name: Release

on:
    push:
        branches: [next]

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            version: ${{ steps.release.outputs.version }}
        steps:
            - uses: googleapis/release-please-action@v4
              id: release
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  target-branch: next
                  config-file: release-please-config.json

    publish:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - uses: nowely/action-setup-node@v1
            - name: Sync version to packages
              run: |
                  node -e "
                    const fs = require('fs');
                    const v = '${{ needs.release-please.outputs.version }}';
                    for (const p of ['packages/react/markput', 'packages/vue/markput']) {
                      const f = p + '/package.json';
                      const pkg = JSON.parse(fs.readFileSync(f));
                      pkg.version = v;
                      fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
                    }
                  "
            - run: pnpm build:react && pnpm build:vue
            - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
            - run: pnpm -F @markput/react run publish && pnpm -F @markput/vue run publish
