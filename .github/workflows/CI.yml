name: CI

on:
    workflow_dispatch:
    pull_request:
        branches: ['**']
    push:
        branches: [main, master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tests:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Tests
              run: pnpm test

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Typecheck
              run: pnpm run typecheck

    lint:
        name: Lint Code
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Lint
              run: pnpm run lint

    format:
        name: Check Formatting
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        permissions:
            contents: write
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Check if Last Commit is Auto-format
              id: check_commit
              run: |
                  git fetch origin ${{ github.head_ref }}
                  LAST_COMMIT_MSG=$(git log origin/${{ github.head_ref }} -1 --pretty=%B)
                  if [[ "$LAST_COMMIT_MSG" == "chore: apply automatic formatting" ]]; then
                      echo "skip=true" >> $GITHUB_OUTPUT
                  else
                      echo "skip=false" >> $GITHUB_OUTPUT
                  fi

            - name: Checkout PR Branch
              if: steps.check_commit.outputs.skip == 'false'
              run: |
                  git checkout ${{ github.head_ref }}
                  git pull origin ${{ github.head_ref }}

            - name: Apply Formatting
              if: steps.check_commit.outputs.skip == 'false'
              run: pnpm run format:write

            - name: Check for Changes
              if: steps.check_commit.outputs.skip == 'false'
              id: verify
              run: |
                  if ! git diff --quiet; then
                      echo "changes=true" >> $GITHUB_OUTPUT
                  else
                      echo "changes=false" >> $GITHUB_OUTPUT
                  fi

            - name: Commit and Push Changes
              if: steps.check_commit.outputs.skip == 'false' && steps.verify.outputs.changes == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  git commit -m "chore: apply automatic formatting"
                  git push origin ${{ github.head_ref }}

    build:
        name: Build Package
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Build
              run: pnpm run build
