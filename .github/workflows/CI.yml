name: CI

on:
    workflow_dispatch:
    push:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    tests:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: ./.github/actions/setup-environment

            - name: Run Tests
              run: pnpm test

    build:
        name: Build Package
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: ./.github/actions/setup-environment

            - name: Run Build
              run: pnpm run build
