name: CI

on:
    workflow_dispatch:
    pull_request:
        branches: ['**']
    push:
        branches: [main, master]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-pr:
        name: Validate PR Title
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    tests:
        name: Run Tests
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Install Playwright Browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Run Tests
              run: pnpm test

            - name: List VRT attachments (debug)
              if: failure()
              run: |
                  echo "--- tree of .vitest-attachments ---"
                  ls -laR packages/storybook/.vitest-attachments/ 2>&1 || echo "directory missing"
                  echo "--- any -actual/-diff pngs anywhere ---"
                  find packages/storybook -name '*-actual-*.png' -o -name '*-diff-*.png' 2>&1 | head -50 || true

            - name: Upload VRT diff artefacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: vrt-diffs
                  path: packages/storybook/.vitest-attachments/**/*
                  if-no-files-found: warn
                  retention-days: 14

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Typecheck
              run: pnpm run typecheck

    lint:
        name: Lint Code
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Lint
              run: pnpm run lint

    build:
        name: Build Package
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Run Build
              run: pnpm run build
    format:
        name: Check Formatting
        runs-on: ubuntu-latest
        steps:
            - name: Setup Environment
              uses: nowely/action-setup-node@v1

            - name: Check Code Formatting
              run: pnpm run format
